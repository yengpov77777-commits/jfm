<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobfinder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="d-flex flex-column min-vh-100"
      style="background: linear-gradient(135deg,#0d1b2a 0%,#03906f 55%,#00a882 100%);
             font-family:'Plus Jakarta Sans',sans-serif;">
    <!-- ══════════════ NAVBAR ══════════════ -->

    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">
          <span
            style="font-size: 1.5rem; font-weight: 900; color: var(--primary)"
            >J<span style="color: var(--accent)">F</span>M</span
          >
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMain"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
          <ul class="navbar-nav mx-auto gap-1">
            <li class="nav-item">
              <a
                class="nav-link text-secondary fs-5"
                href="/frontend/index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link fs-5 active" href="#">Job</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fs-5 text-secondary" href="seekers.html"
                >Seeker</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link fs-5" href="about.html">About</a>
            </li>
            <li class="nav-item fs-4">
              <a class="nav-link fs-5" href="contact.html">Contact</a>
            </li>
          </ul>
          <div class="navbar-icons d-flex align-items-center">
            <a
              href="#"
              class="btn btn-primary text-while"
              style="color: white !important"
              >register</a
            >
            <a href="#" class="btn text-primary">login</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ═══════════════ PAGE BODY ═══════════════ -->
  <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5 position-relative overflow-hidden">
 
    <!-- Decorative blobs (inline only — pure presentational, no class needed) -->
    <div class="position-absolute rounded-circle"
         style="width:500px;height:500px;background:#00a882;
                filter:blur(80px);opacity:.18;top:-120px;right:-80px;pointer-events:none;"></div>
    <div class="position-absolute rounded-circle"
         style="width:350px;height:350px;background:#03906f;
                filter:blur(80px);opacity:.18;bottom:-80px;left:-60px;pointer-events:none;"></div>
 
    <!-- Shield watermark -->
    <svg class="position-absolute d-none d-lg-block"
         style="right:8%;top:50%;transform:translateY(-50%);width:340px;opacity:.12;"
         viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 10L20 45V110C20 158 56 201 100 220C144 201 180 158 180 110V45L100 10Z"
            stroke="white" stroke-width="8" fill="none"/>
      <path d="M100 10L20 45V110C20 158 56 201 100 220C144 201 180 158 180 110V45L100 10Z"
            fill="white" fill-opacity="0.08"/>
      <path d="M75 120l18 18 34-38" stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
 
 
    <!-- ══════ LOGIN CARD ══════ -->
    <div class="position-relative rounded-4 p-5 w-100"
         style="max-width:440px;
                background:rgba(255,255,255,0.07);
                backdrop-filter:blur(18px);
                -webkit-backdrop-filter:blur(18px);
                border:1px solid rgba(255,255,255,0.18);
                box-shadow:0 24px 60px rgba(0,0,0,.3);
                z-index:10;">
 
      <!-- Card logo -->
      <div class="fw-bold mb-1 text-white" style="font-size:1.45rem;">
        Job <span style="color:#ff4c1f;">Finder</span>
      </div>
 
      <!-- Card title -->
      <h2 class="fw-bold text-white mb-1" style="font-size:1.65rem;letter-spacing:-.4px;">
        Welcome back
      </h2>
 
      <!-- Card subtitle -->
      <p class="mb-4 small" style="color:rgba(255,255,255,.65);">
        Don't have an account?
        <a href="#" class="fw-bold text-decoration-none" style="color:#00a882;">Register here</a>
      </p>
 
      <!-- ── FORM ── -->
      <form id="loginForm" novalidate>
 
        <!-- Email -->
        <div class="mb-3">
          <label for="email"
                 class="form-label fw-bold text-uppercase small mb-1 letter-spacing-1"
                 style="color:rgba(255,255,255,.75);letter-spacing:.04em;">
            Email address
          </label>
          <input type="email" id="email"
                 class="form-control rounded-3 border-0"
                 placeholder="you@example.com"
                 required
                 style="background:rgba(255,255,255,.1);
                        border:1px solid rgba(255,255,255,.2)!important;
                        color:#fff;padding:.72rem 1rem;font-size:.95rem;">
          <div class="invalid-feedback" style="color:#ff8a7a;">
            Please enter a valid email.
          </div>
        </div>
 
        <!-- Password -->
        <div class="mb-2">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password"
                   class="form-label fw-bold text-uppercase small mb-0"
                   style="color:rgba(255,255,255,.75);letter-spacing:.04em;">
              Password
            </label>
            <a href="#" class="small fw-semibold text-decoration-none"
               style="color:rgba(255,255,255,.55);">Forgot password?</a>
          </div>
 
          <div class="input-group">
            <input type="password" id="password"
                   class="form-control border-end-0 rounded-start-3"
                   placeholder="••••••••"
                   required minlength="6"
                   style="background:rgba(255,255,255,.1);
                          border:1px solid rgba(255,255,255,.2)!important;
                          color:#fff;padding:.72rem 1rem;font-size:.95rem;">
            <span id="togglePwd"
                  class="input-group-text border-start-0 rounded-end-3"
                  style="background:rgba(255,255,255,.1);
                         border:1px solid rgba(255,255,255,.2)!important;
                         color:rgba(255,255,255,.55);cursor:pointer;">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
                   width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173
                         8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12
                         0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828
                         8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465
                         1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134
                         13.134 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0
                         0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
              </svg>
            </span>
          </div>
          <div id="pwdError" class="mt-1 small d-none" style="color:#ff8a7a;"></div>
        </div>
 
        <!-- Remember me -->
        <div class="form-check mt-3 mb-4">
          <input type="checkbox" class="form-check-input" id="remember"
                 style="background-color:rgba(255,255,255,.15);
                        border-color:rgba(255,255,255,.3);">
          <label class="form-check-label small" for="remember"
                 style="color:rgba(255,255,255,.7);">
            Remember me for 30 days
          </label>
        </div>
 
        <!-- Submit -->
        <button type="submit"
                class="btn w-100 fw-bold rounded-3 py-2"
                style="background:#00a882;color:#fff;font-size:1rem;
                       letter-spacing:.02em;
                       box-shadow:0 8px 24px rgba(0,168,130,.35);
                       transition:background .2s,transform .15s,box-shadow .2s;"
                onmouseover="this.style.background='#03906f';this.style.transform='translateY(-2px)';"
                onmouseout="this.style.background='#00a882';this.style.transform='none';">
          Login
        </button>
 
      </form>
      <!-- ── END FORM ── -->


  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</html>
